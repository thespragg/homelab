proxmox_hostname: apollo
proxmox_domain: internal.thespragg.dev
proxmox_nic: nic0

# Network
proxmox_management_ip: 10.0.10.2/24
proxmox_management_gateway: 10.0.10.1

# VLANs. VLAN 999 is deliberately unused so untagged trunk traffic goes nowhere.
proxmox_management_vlan: 10
proxmox_lan_vlan: 20
proxmox_wan1_vlan: 100
proxmox_wan2_vlan: 101
proxmox_native_vlan: 999
proxmox_allowed_vlans:
  - "10"
  - "20"
  - "100"
  - "101"
  - "999"
proxmox_management_cidr: 10.0.10.0/24
proxmox_lan_cidr: 10.0.20.0/24
proxmox_lan_gateway: 10.0.20.1

# OPNsense — API calls are made from this host to the OPNsense VM
opnsense_api_url: "http://10.0.10.1"
opnsense_api_key: "{{ vault_opnsense_api_key }}"
opnsense_api_secret: "{{ vault_opnsense_api_secret }}"

opnsense_wan1_interface: vtnet0
opnsense_wan2_interface: vtnet1
opnsense_management_interface: vtnet2
opnsense_lan_interface: vtnet3
opnsense_management_ip: 10.0.10.1
opnsense_lan_ip: 10.0.20.1
opnsense_lan_cidr: 10.0.20.0/24

opnsense_unbound_port: 5335

opnsense_dhcp_interface: lan
opnsense_dhcp_range_start: 10.0.20.100
opnsense_dhcp_range_end: 10.0.20.200
opnsense_dhcp_dns: 10.0.20.3  # AdGuard

opnsense_management_rules:
  - description: Allow trusted LAN SSH to Proxmox
    interface: lan
    source: 10.0.20.0/24
    destination: 10.0.10.2
    destination_port: "22"
  - description: Allow trusted LAN HTTPS to Proxmox
    interface: lan
    source: 10.0.20.0/24
    destination: 10.0.10.2
    destination_port: "8006"

opnsense_host_overrides:
  - host: ""
    domain: internal.thespragg.dev
    ip: 10.0.20.4  # Caddy

opnsense_dns_entries: []
