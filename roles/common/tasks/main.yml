- name: Ensure .ssh directory exists for root
  file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Add authorized SSH keys
  authorized_key:
    user: root
    key: "{{ item }}"
    state: present
  loop: "{{ ssh_authorized_keys }}"

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install essential packages
  apt:
    name:
      - curl
      - wget
      - git
      - sudo
      - unzip
      - ufw
    state: present

- name: Allow SSH through firewall
  ufw:
    rule: allow
    name: OpenSSH

- name: Set default firewall policy
  ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Set timezone
  timezone:
    name: Europe/London

- name: Install locales package
  apt:
    name: locales
    state: present

- name: Generate en_US.UTF-8 locale
  locale_gen:
    name: en_US.UTF-8
    state: present