- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install essential packages
  apt:
    name:
      - curl
      - wget
      - git
      - sudo
      - unzip
      - ufw
    state: present

- name: Set timezone
  timezone:
    name: Europe/London

- name: Install locales package
  apt:
    name: locales
    state: present

- name: Generate en_US.UTF-8 locale
  locale_gen:
    name: en_US.UTF-8
    state: present