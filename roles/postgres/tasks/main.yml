- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download postgres apt key
  get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /etc/apt/keyrings/postgresql.asc
    mode: '0644'

- name: Add postgres apt repository
  deb822_repository:
    name: postgresql
    types: deb
    uris: https://apt.postgresql.org/pub/repos/apt
    suites: "{{ ansible_distribution_release }}-pgdg"
    components: main
    signed_by: /etc/apt/keyrings/postgresql.asc
    state: present
    enabled: yes

- name: Install postgres dependencies
  apt:
    name:
      - postgresql-{{ postgres_version }}
      - postgresql-client-{{ postgres_version }}
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Ensure postgres is started and enabled
  systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Set postgres superuser password
  become_user: postgres
  postgresql_user:
    name: postgres
    password: "{{ postgres_superuser_password }}"
    state: present

- name: Create databases
  become_user: postgres
  postgresql_db:
    name: "{{ item.name }}"
    encoding: UTF-8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present
  loop: "{{ postgres_databases }}"
  no_log: true

- name: Create database users
  become_user: postgres
  postgresql_user:
    name: "{{ item.user }}"
    password: "{{ item.password }}"
    state: present
  loop: "{{ postgres_databases }}"
  no_log: true

- name: Grant user privileges on database
  become_user: postgres
  postgresql_privs:
    database: "{{ item.name }}"
    role: "{{ item.user }}"
    privs: ALL
    type: database
    state: present
  loop: "{{ postgres_databases }}"
  no_log: true