- name: Configure Debian base APT sources
  ansible.builtin.copy:
    dest: /etc/apt/sources.list
    content: |
      deb http://deb.debian.org/debian trixie main contrib
      deb http://deb.debian.org/debian trixie-updates main contrib
      deb http://security.debian.org/debian-security trixie-security main contrib
    owner: root
    group: root
    mode: "0644"

- name: Suppress non-free firmware APT warning
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/no-bookworm-firmware.conf
    content: 'APT::Get::Update::SourceListWarnings::NonFreeFirmware "false";'
    owner: root
    group: root
    mode: "0644"

- name: Remove Proxmox enterprise repository (list format)
  file:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    state: absent

- name: Remove Proxmox enterprise repository (sources format)
  file:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    state: absent

- name: Remove Ceph enterprise repository (list format)
  file:
    path: /etc/apt/sources.list.d/ceph.list
    state: absent

- name: Remove Ceph enterprise repository (sources format)
  file:
    path: /etc/apt/sources.list.d/ceph.sources
    state: absent

- name: Add Proxmox no-subscription repository
  apt_repository:
    repo: "deb http://download.proxmox.com/debian/pve trixie pve-no-subscription"
    state: present
    filename: pve-no-subscription
    update_cache: no

- name: Update apt cache
  apt:
    update_cache: yes
