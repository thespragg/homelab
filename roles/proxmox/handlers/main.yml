- name: Restart sshd
  service:
    name: sshd
    state: restarted

- name: Restart fail2ban
  service:
    name: fail2ban
    state: restarted

- name: Apply network configuration
  command: ifreload -a

- name: Apply subscription nag removal
  ansible.builtin.command:
    cmd: /usr/local/bin/pve-remove-nag.sh
  changed_when: true
