- name: Install docker dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

- name: Create docker apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download docker apt key
  get_url:
    url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add docker apt repository
  deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/{{ ansible_distribution | lower }}
    suites: "{{ ansible_distribution_release }}"
    components: stable
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
    enabled: yes

- name: Install docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Ensure docker is started and enabled
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Create immich directory
  file:
    path: "{{ immich_dir }}"
    state: directory
    mode: '0755'

- name: Create immich upload directory
  file:
    path: "{{ immich_upload_location }}"
    state: directory
    mode: '0755'

- name: Create immich postgres data directory
  file:
    path: "{{ immich_db_data_location }}"
    state: directory
    mode: '0755'

- name: Place docker compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ immich_dir }}/docker-compose.yml"
    mode: '0644'
  no_log: true

- name: Allow Immich through firewall
  ufw:
    rule: allow
    port: "{{ immich_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ immich_allowed_hosts }}"

- name: Start immich stack
  shell: "docker compose -f {{ immich_dir }}/docker-compose.yml up -d --pull always"
  args:
    chdir: "{{ immich_dir }}"
